<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flower Processing Digital Twin - Full Process</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: white; user-select: none; }
        canvas { display: block; }
        .panel { background: rgba(20, 30, 50, 0.9); border: 1px solid #2e4a7a; padding: 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: absolute; }
        
        #currentView { top: 20px; left: 20px; width: 180px; }
        #mouseControl { bottom: 20px; right: 20px; font-size: 12px; }
        #mouseControl b { color: #38bdf8; display: block; margin-bottom: 5px; }
        .status-ok { color: #4ade80; font-weight: bold; }
        .status-loading { color: #fbbf24; font-weight: bold; }
        .status-error { color: #f87171; font-weight: bold; }

        /* Simulación de la Tableta del Operario */
        #tabletUI { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; display: none; border: 2px solid #38bdf8; background: #0f172a; z-index: 10; }
        #tabletUI h3 { margin: 0 0 10px 0; color: #38bdf8; text-align: center; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .tablet-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; border-bottom: 1px dashed #334155; padding-bottom: 2px;}

        .label { color: white; font-size: 12px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; border: 1px solid #38bdf8; pointer-events: none; white-space: nowrap; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="currentView" class="panel">
        <div style="text-align: center; color: #cbd5e1; font-size: 11px; margin-bottom:5px; border-bottom: 1px solid #333;">Digital Twin System</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top:5px;">Fase del Proceso:</div>
        <div id="phaseStatus" style="font-size: 12px; color: #38bdf8; font-weight: bold;">Iniciando...</div>
        <div style="font-size: 10px; color: #94a3b8; margin-top:8px;">Cajas en Planta: <span id="plantBoxesCount">0</span>/12</div>
        <div style="font-size: 10px; color: #f87171;">Rechazadas: <span id="rejectedCount">0</span></div>
    </div>
    
    <div id="mouseControl" class="panel">
        <b>Controles:</b>
        <div>🖱️ Click izq + arrastrar · Rotar</div>
        <div>🖱️ Rueda · Zoom</div>
        <div>🖱️ Click der + arrastrar · Mover</div>
    </div>

    <div id="tabletUI" class="panel">
        <h3>📱 Tableta Recepción</h3>
        <div class="tablet-row"><span>Orden:</span> <span>#PO-8842</span></div>
        <div class="tablet-row"><span>Origen:</span> <span>Fincas Falcom</span></div>
        <div class="tablet-row"><span>Esperadas:</span> <span>12 u</span></div>
        <div class="tablet-row"><span>Leídas RFID:</span> <span id="scannedBoxes">0</span></div>
        <div style="text-align: center; margin-top: 10px;" id="matchStatus" class="status-loading">Verificando...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- CONFIGURACIÓN BÁSICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a101f);
        scene.fog = new THREE.FogExp2(0x0a101f, 0.0012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        // Cámara posicionada para ver mejor la planta principal
        camera.position.set(-100, 150, 180); 
        camera.lookAt(-50,0,0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Activar sombras para más realismo
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(-40, 0, 0);

        // --- ILUMINACIÓN ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 200, 100);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 150;
        dirLight.shadow.camera.bottom = -150;
        dirLight.shadow.camera.left = -150;
        dirLight.shadow.camera.right = 150;
        scene.add(dirLight);

        // --- ENTORNO ---
        const floorGeo = new THREE.PlaneGeometry(400, 300);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.9, metalness: 0.1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        const grid = new THREE.GridHelper(400, 80, 0x1e293b, 0x1e293b);
        grid.position.y = 0.1;
        scene.add(grid);

        // --- UTILIDADES ---
        function createLabel(text, position, parent, offset = new THREE.Vector3(0,0,0)) {
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = text;
            const label = new CSS2DObject(div);
            label.position.copy(position).add(offset);
            parent.add(label);
            return label;
        }

        function createHumanoid(color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const head = new THREE.Mesh(new THREE.SphereGeometry(1.5), mat);
            head.position.y = 5;
            head.castShadow = true;
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 1.5), mat);
            body.position.y = 2.5;
            body.castShadow = true;
            group.add(head, body);
            return group;
        }

        // --- PLANTA PRINCIPAL (Izquierda) ---
        const mainPlantGroup = new THREE.Group();
        mainPlantGroup.position.set(-80, 0, 0);
        scene.add(mainPlantGroup);

        // Base y Estructura
        const mainBase = new THREE.Mesh(new THREE.BoxGeometry(140, 2, 100), new THREE.MeshStandardMaterial({ color: 0x2c3e50 }));
        mainBase.position.y = 1;
        mainBase.receiveShadow = true;
        mainPlantGroup.add(mainBase);
        
        const mainStructure = new THREE.Mesh(new THREE.BoxGeometry(138, 25, 98), new THREE.MeshStandardMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.15, wireframe: false, side: THREE.DoubleSide }));
        mainStructure.position.y = 13.5;
        mainPlantGroup.add(mainStructure);
        createLabel("Planta Principal - Procesamiento", new THREE.Vector3(0, 28, 0), mainPlantGroup);

        // NUEVO: Bandas Transportadoras (Recepción a Calidad)
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.8 });
        for(let i=-1; i<=1; i++) {
             const belt = new THREE.Mesh(new THREE.BoxGeometry(60, 1, 4), beltMat);
             belt.position.set(10, 2.5, i * 8 + 35); // Posicionadas en la zona de recepción
             belt.receiveShadow = true;
             mainPlantGroup.add(belt);
        }
        createLabel("Descarga & Bandas", new THREE.Vector3(30, 10, 35), mainPlantGroup);

        // NUEVO: Área de Calidad (QC)
        const qcStationMat = new THREE.MeshStandardMaterial({color: 0xf59e0b, metalness: 0.7, roughness: 0.2});
        const qcArch = new THREE.Mesh(new THREE.TorusGeometry(5, 0.5, 16, 32, Math.PI), qcStationMat);
        qcArch.position.set(-10, 3, 35); // Sobre la banda central
        qcArch.rotation.y = Math.PI/2;
        mainPlantGroup.add(qcArch);

        const qcInspector = createHumanoid(0xffff00); // Amarillo intenso para QC
        qcInspector.position.set(-10, 2, 42);
        qcInspector.rotation.y = Math.PI;
        mainPlantGroup.add(qcInspector);
        createLabel("Estación de Calidad (QC)", new THREE.Vector3(-10, 12, 35), mainPlantGroup);
        const rejectArea = new THREE.Mesh(new THREE.CircleGeometry(5), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.3}));
        rejectArea.rotation.x = -Math.PI/2;
        rejectArea.position.set(-15, 2.1, 50);
        mainPlantGroup.add(rejectArea);
        createLabel("Zona Rechazo", new THREE.Vector3(-15, 5, 50), mainPlantGroup);


        // NUEVO: Área de Picking (Estanterías)
        const shelfMat = new THREE.MeshStandardMaterial({ color: 0x64748b });
        const shelfGeo = new THREE.BoxGeometry(5, 20, 40);
        for(let i=0; i<3; i++) {
            const shelf = new THREE.Mesh(shelfGeo, shelfMat);
            shelf.position.set(-50 + (i*15), 11, 0);
            shelf.castShadow = true;
            mainPlantGroup.add(shelf);
        }
        createLabel("Área de Picking / Almacén", new THREE.Vector3(-50, 25, 0), mainPlantGroup);

        // Operario de Recepción (inicial)
        const receiverWorker = createHumanoid(0x38bdf8);
        receiverWorker.position.set(40, 2, 30);
        mainPlantGroup.add(receiverWorker);


        // --- FINCAS FALCOM (Derecha - Origen) ---
        const falcomGroup = new THREE.Group();
        falcomGroup.position.set(100, 0, -30);
        scene.add(falcomGroup);

        const falcomBase = new THREE.Mesh(new THREE.BoxGeometry(60, 2, 40), new THREE.MeshStandardMaterial({ color: 0x573c2c }));
        falcomBase.position.y = 1;
        falcomGroup.add(falcomBase);
        createLabel("Fincas Falcom (Origen)", new THREE.Vector3(0, 15, 0), falcomGroup);

        const printer = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 5), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        printer.position.set(-15, 3, 0);
        falcomGroup.add(printer);
        const conveyorFalcom = new THREE.Mesh(new THREE.BoxGeometry(25, 0.5, 4), new THREE.MeshStandardMaterial({ color: 0x555555 }));
        conveyorFalcom.position.set(0, 2.5, 0);
        falcomGroup.add(conveyorFalcom);

        const falcomWorker1 = createHumanoid(0xf97316); // Naranja
        falcomWorker1.position.set(-15, 2, 5);
        falcomGroup.add(falcomWorker1);

        // --- CAMIÓN ---
        const truck = new THREE.Group();
        const cab = new THREE.Mesh(new THREE.BoxGeometry(7, 7, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        cab.position.set(-7, 4.5, 0);
        cab.castShadow = true;
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 9), new THREE.MeshStandardMaterial({ color: 0xd1d5db }));
        trailer.position.set(5, 5.5, 0);
        trailer.castShadow = true;
        truck.add(cab, trailer);
        scene.add(truck);
        
        const posFalcom = new THREE.Vector3(110, 0, 0);
        const posMain = new THREE.Vector3(-35, 0, 35); // Punto de llegada a bandas
        truck.position.copy(posFalcom);


        // --- VARIABLES DE SIMULACIÓN ---
        let simState = 0;
        // Estados:
        // 0: Producción Falcom
        // 1: Viaje Camión
        // 2: Recepción (Tableta)
        // 3: Descarga a Bandas y Control de Calidad
        // 4: Almacenamiento en Picking
        // 5: Reset

        let timer = 0;
        let boxesInTruck = 0;
        const expectedBoxes = 12; // Total de cajas para la demo
        const rejectionIndex = 3; // La 4ta caja (índice 3) será rechazada
        
        let boxesFalcom = [];
        let boxesPlant = []; // Cajas en proceso en la planta principal
        let rejectedCount = 0;
        let processedInPlantCount = 0;

        // UI Elements
        const uiPhase = document.getElementById('phaseStatus');
        const tabletUI = document.getElementById('tabletUI');
        const uiScanned = document.getElementById('scannedBoxes');
        const uiMatch = document.getElementById('matchStatus');
        const uiPlantCount = document.getElementById('plantBoxesCount');
        const uiRejected = document.getElementById('rejectedCount');


        // --- FUNCIONES DE CREACIÓN DE CAJAS ---
        function createBoxMesh() {
             const box = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 2.8), new THREE.MeshStandardMaterial({ color: 0xca8a04 }));
             box.castShadow = true;
             const rfidTag = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2), new THREE.MeshBasicMaterial({ color: 0x38bdf8 }));
             rfidTag.position.set(0, 1.41, 0);
             rfidTag.rotation.x = -Math.PI/2;
             box.add(rfidTag);
             return box;
        }

        function spawnBoxAtFalcom() {
            const box = createBoxMesh();
            box.position.set(-15, 4, 0);
            falcomGroup.add(box);
            boxesFalcom.push({ mesh: box, progress: 0 });
        }

        function spawnBoxFromTruckToBelt(index) {
            const box = createBoxMesh();
            // Posición inicial: cola del camión en coordenadas locales de mainPlant
            box.position.set(45, 4, 35); 
            mainPlantGroup.add(box);
            
            boxesPlant.push({ 
                mesh: box, 
                progress: 0, 
                index: index, 
                state: 'belt', // 'belt', 'qc_check', 'approved', 'rejected'
                qcTimer: 0,
                targetShelfPos: new THREE.Vector3(-45 + (index%3)*15, 5 + Math.floor(index/3)*4, 0 + (index%2)*5) // Posición de destino simple
            });
            uiPlantCount.textContent = boxesPlant.length;
        }


        // --- BUCLE PRINCIPAL DE ANIMACIÓN ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            timer += delta;

            switch(simState) {
                case 0: // === FALCOM: Producción y Carga ===
                    uiPhase.textContent = "1. Origen: Producción y Carga";
                    if (timer > 0.8 && boxesInTruck < expectedBoxes) {
                        spawnBoxAtFalcom();
                        timer = 0;
                    }
                    // Animar cinta Falcom
                    for (let i = boxesFalcom.length - 1; i >= 0; i--) {
                        let b = boxesFalcom[i];
                        b.progress += delta * 0.8;
                        b.mesh.position.x = -15 + (b.progress * 25);
                        if (b.progress >= 1) {
                            falcomGroup.remove(b.mesh); b.mesh.geometry.dispose(); b.mesh.material.dispose();
                            boxesFalcom.splice(i, 1);
                            boxesInTruck++;
                        }
                    }
                    if (boxesInTruck >= expectedBoxes && boxesFalcom.length === 0) {
                        simState = 1; timer = 0; truck.rotation.y = Math.PI;
                    }
                    break;

                case 1: // === LOGÍSTICA: Viaje ===
                    uiPhase.textContent = "2. Logística: Transporte a Planta";
                    let travelProgress = Math.min(timer / 3, 1);
                    truck.position.lerpVectors(posFalcom, posMain, travelProgress);
                    if (travelProgress >= 1) {
                        simState = 2; timer = 0; truck.rotation.y = Math.PI / 2;
                    }
                    break;

                case 2: // === RECEPCIÓN: Verificación Tableta ===
                    uiPhase.textContent = "3. Recepción: Validación RFID";
                    if (timer < 1) receiverWorker.position.lerp(new THREE.Vector3(45, 2, 38), delta * 2);
                    
                    if (timer > 1 && timer < 1.1) {
                        tabletUI.style.display = 'block'; uiScanned.textContent = "0"; uiMatch.className = "status-loading"; uiMatch.textContent = "Escaneando...";
                    }
                    if (timer > 1.5 && timer < 3.5) {
                        uiScanned.textContent = Math.min(expectedBoxes, Math.floor((timer - 1.5) * 7));
                    }
                    if (timer > 3.5) {
                        uiScanned.textContent = expectedBoxes; uiMatch.textContent = "¡MATCH OK!"; uiMatch.className = "status-ok";
                    }
                    if (timer > 5) {
                        tabletUI.style.display = 'none';
                        simState = 3; timer = 0; // TRANSICIÓN AL NUEVO ESTADO 3
                        receiverWorker.position.set(40, 2, 30); // Reset worker
                    }
                    break;

                case 3: // === PLANTA: Descarga y Control de Calidad (NUEVO) ===
                    uiPhase.textContent = "4. Planta: Descarga y Control Calidad";
                    
                    // 1. Descargar cajas del camión a la banda rítmicamente
                    if(timer > 1.5 && processedInPlantCount < expectedBoxes) {
                        spawnBoxFromTruckToBelt(processedInPlantCount);
                        processedInPlantCount++;
                        timer = 0;
                    }

                    // 2. Lógica de movimiento en Planta
                    let allFinishedQC = true;

                    boxesPlant.forEach(b => {
                        if(b.state !== 'finished_storage') allFinishedQC = false;

                        if(b.state === 'belt') {
                            // Moverse por la banda hacia QC (aprox x=-10)
                            b.progress += delta * 0.2;
                            b.mesh.position.x = 45 - (b.progress * 55); // Mover de x=45 a x=-10
                            
                            // Llegada al punto de control QC (x aprox -10)
                            if(b.mesh.position.x <= -10) {
                                b.state = 'qc_check';
                                b.mesh.position.x = -10; // Asegurar posición
                            }

                        } else if (b.state === 'qc_check') {
                            // Simular escaneo (pausa y cambio de color)
                            b.qcTimer += delta;
                            b.mesh.material.color.setHex(0xffff00); // Amarillo escaneo

                            if(b.qcTimer > 0.8) { // Tiempo de escaneo finalizado
                                if(b.index === rejectionIndex) {
                                    b.state = 'rejected';
                                    b.mesh.material.color.setHex(0xff0000); // Rojo rechazo
                                    rejectedCount++;
                                    uiRejected.textContent = rejectedCount;
                                } else {
                                    b.state = 'approved';
                                    b.mesh.material.color.setHex(0x4ade80); // Verde aprobado
                                }
                            }
                        } else if (b.state === 'rejected') {
                            // Mover a zona de rechazo
                            b.mesh.position.lerp(new THREE.Vector3(-15, 2.5, 50), delta * 2);

                        } else if (b.state === 'approved') {
                             // Moverse hacia el final de la banda para picking (aprox x=-20)
                             b.mesh.position.x -= delta * 15;
                             // Restaurar color original del cartón poco a poco
                             b.mesh.material.color.lerp(new THREE.Color(0xca8a04), delta*2);

                             if(b.mesh.position.x <= -20) {
                                 b.state = 'moving_to_shelf'; // Lista para la siguiente fase
                             }
                        }
                    });

                    // Si todas las cajas han pasado el punto de QC, avanzar estado
                    if(processedInPlantCount === expectedBoxes && boxesPlant.every(b => b.state === 'moving_to_shelf' || b.state === 'rejected')) {
                         simState = 4;
                         timer = 0;
                    }
                    break;

                case 4: // === PLANTA: Almacenamiento en Picking (NUEVO) ===
                    uiPhase.textContent = "5. Planta: Almacenamiento en Picking";
                    
                    let allStored = true;
                    boxesPlant.forEach(b => {
                        if(b.state === 'moving_to_shelf') {
                            allStored = false;
                            // "Volar" hacia la estantería
                            b.mesh.position.lerp(b.targetShelfPos, delta * 3);
                            if(b.mesh.position.distanceTo(b.targetShelfPos) < 0.5) {
                                b.state = 'finished_storage';
                                b.mesh.rotation.y = Math.random() * 0.2; // Un poco de variación natural
                            }
                        }
                    });

                    if(allStored && timer > 3) { // Esperar 3 segs al finalizar
                        simState = 5; timer = 0;
                    }
                    break;


                case 5: // === RESET COMPLETO ===
                    uiPhase.textContent = "Reiniciando simulación...";
                    if(timer > 2) {
                        // Limpiar planta
                        boxesPlant.forEach(b => mainPlantGroup.remove(b.mesh));
                        boxesPlant = []; rejectedCount = 0; processedInPlantCount = 0;
                        uiPlantCount.textContent = 0; uiRejected.textContent = 0;
                        
                        // Reset variables globales
                        truck.position.copy(posFalcom); truck.rotation.y = 0;
                        boxesInTruck = 0;
                        simState = 0; timer = 0;
                    }
                    break;
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
